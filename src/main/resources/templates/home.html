<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Investory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/css/main.css" rel="stylesheet">
    <style>
        .iv-hero {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .iv-hero__card {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: var(--iv-surface);
            border: 1px solid var(--iv-border);
            border-radius: var(--iv-radius);
            box-shadow: var(--iv-shadow);
            padding: 40px 32px;
        }
        .iv-hero__logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, var(--iv-primary), var(--iv-blue));
            box-shadow: 0 10px 24px rgba(79, 70, 229, .35);
        }
        .iv-hero__title { margin: 0 0 6px; font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; }
        .iv-hero__subtitle { margin: 0 0 28px; color: var(--iv-text-muted); }
        .iv-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 13px 20px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, var(--iv-primary), var(--iv-blue));
            box-shadow: 0 8px 20px rgba(79, 70, 229, .3);
            transition: transform .15s ease, box-shadow .15s ease;
        }
        .iv-btn:hover { transform: translateY(-2px); box-shadow: var(--iv-shadow-hover); }
        .iv-hero__links { margin-top: 18px; }
        .iv-hero__links a { color: var(--iv-primary); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
<main class="iv-hero">
    <div class="iv-hero__card">
        <div class="iv-hero__logo">I</div>
        <h1 class="iv-hero__title">Welcome to Investory</h1>
        <p class="iv-hero__subtitle">Track your portfolio performance across brokers.</p>
        <a class="iv-btn" href="/oauth2/authorization/google">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="currentColor"><path d="M21.35 11.1H12v2.8h5.35c-.25 1.36-1.5 4-5.35 4a5.9 5.9 0 1 1 0-11.8 5.3 5.3 0 0 1 3.75 1.46l1.9-1.9A8 8 0 1 0 12 20a7.7 7.7 0 0 0 7.85-7.9c0-.53-.06-.7-.5-1z"/></svg>
            Continue with Google
        </a>
        <p class="iv-hero__links"><a href="/dashboard">Open dashboard →</a></p>
    </div>
</main>
</body>
</html>
