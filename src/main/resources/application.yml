spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: profile, email
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate.ddl-auto: none
    generate-ddl: false
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: investory
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventory}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    schemas: investory
    locations: classpath:sql/migration
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  thymeleaf:
    prefix: classpath:/static/dashboard/
    suffix: .html
    mode: HTML
    cache: false
    enabled: true
    check-template: true
    check-template-location: true
    template-resolver-order: 1

app:
  api:
    twelve-data-key: ${TWELVEDATA_API_KEY:}
    exchange-rate-key: ${EXCHANGERATE_API_KEY:}
  security:
    admin-username: ${APP_SECURITY_ADMIN_USERNAME:admin}
    admin-password: ${APP_SECURITY_ADMIN_PASSWORD:change-me-admin}
    user-username: ${APP_SECURITY_USER_USERNAME:user}
    user-password: ${APP_SECURITY_USER_PASSWORD:change-me-user}
  telegram:
    bot-username: ${TELEGRAM_BOT_USERNAME:}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}

